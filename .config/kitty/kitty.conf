# cursor none

font_family Hack Nerd Font

bold_font auto
bold_italic_font auto
italic_font auto

font_size 16.0

enable_audio_bell no

map ctrl+shift+enter new_window_with_cwd

tab_bar_style powerline
tab_powerline_style slanted


# BEGIN_KITTY_THEME
# Rosé Pine
include current-theme.conf
# END_KITTY_THEME
